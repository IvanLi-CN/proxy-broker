name: Release

on:
  workflow_run:
    workflows:
      - CI Main
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA on main to release or backfill
        required: true
        type: string

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  PLATFORM_AMD64: linux/amd64
  PLATFORM_ARM64: linux/arm64
  PLATFORMS: linux/amd64,linux/arm64
  RELEASE_SNAPSHOT_NOTES_REF: refs/notes/release-snapshots

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release-meta:
    name: Release Meta
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push') ||
      github.event_name == 'workflow_dispatch'
    permissions:
      actions: read
      contents: write
      issues: read
      pull-requests: read
    outputs:
      requested_sha: ${{ steps.requested-target.outputs.target_sha }}
      selected_target_sha: ${{ steps.release-target.outputs.selected_target_sha }}
      target_sha: ${{ steps.release-target.outputs.target_sha }}
      release_enabled: ${{ steps.snapshot.outputs.release_enabled }}
      snapshot_status: ${{ steps.snapshot.outputs.status }}
      assets_only: ${{ steps.release-target.outputs.assets_only }}
      publish_container: ${{ steps.publication-mode.outputs.publish_container }}
      backlog_pending_count: ${{ steps.release-target.outputs.backlog_pending_count }}
      backlog_pending_targets: ${{ steps.release-target.outputs.backlog_pending_targets }}
      release_bump: ${{ steps.snapshot.outputs.release_bump }}
      release_channel: ${{ steps.snapshot.outputs.release_channel }}
      pr_number: ${{ steps.snapshot.outputs.pr_number }}
      pr_title: ${{ steps.snapshot.outputs.pr_title }}
      image_name_lower: ${{ steps.snapshot.outputs.image_name_lower }}
      app_effective_version: ${{ steps.snapshot.outputs.app_effective_version }}
      selected_release_tag: ${{ steps.snapshot.outputs.selected_release_tag }}
      release_tag: ${{ steps.snapshot.outputs.release_tag }}
      release_prerelease: ${{ steps.snapshot.outputs.release_prerelease }}
      tags_csv: ${{ steps.snapshot.outputs.tags_csv }}
      target_touches_workflows: ${{ steps.release-ref-mode.outputs.target_touches_workflows }}
      requires_release_anchor: ${{ steps.release-ref-mode.outputs.requires_release_anchor }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity for release notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve requested commit
        id: requested-target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target_sha="${{ inputs.commit_sha }}"
          else
            target_sha="${{ github.event.workflow_run.head_sha }}"
          fi

          if [[ ! "${target_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid commit SHA: ${target_sha}" >&2
            exit 1
          fi

          git fetch --no-tags origin main
          git cat-file -e "${target_sha}^{commit}"

          if ! git merge-base --is-ancestor "${target_sha}" origin/main; then
            echo "Commit ${target_sha} is not contained in origin/main" >&2
            exit 1
          fi

          echo "target_sha=${target_sha}" >> "$GITHUB_OUTPUT"

      - name: Validate manual backfill target passed CI Main
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.requested-target.outputs.target_sha }}
        with:
          script: |
            const { owner, repo } = context.repo
            const sha = process.env.TARGET_SHA
            if (!sha) {
              core.setFailed('Missing TARGET_SHA')
              return
            }

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'ci-main.yml',
              branch: 'main',
              event: 'push',
              head_sha: sha,
              status: 'completed',
              per_page: 100,
            })

            const matchingRuns = (runs.data.workflow_runs || []).filter(run => run.head_sha === sha)
            const passed = matchingRuns.some(run => run.conclusion === 'success')
            if (passed) {
              core.notice(`Verified successful CI Main history for ${sha}`)
              return
            }

            for (const run of matchingRuns) {
              if (run.conclusion !== 'failure') {
                continue
              }

              const jobs = await github.rest.actions.listJobsForWorkflowRun({
                owner,
                repo,
                run_id: run.id,
                per_page: 100,
              })

              const entries = jobs.data.jobs || []
              const snapshotJob = entries.find(job => job.name === 'Release Snapshot')
              const blockingJobs = entries.filter(
                job => job.name !== 'Release Snapshot' && job.conclusion !== 'success'
              )

              if (snapshotJob && snapshotJob.conclusion === 'failure' && blockingJobs.length === 0) {
                core.notice(`Accepted snapshot-only CI Main failure for ${sha} via run ${run.id}`)
                return
              }
            }

            core.setFailed(`Manual backfill requires either a successful CI Main run or a snapshot-only CI Main failure for ${sha}`)

      - name: Ensure immutable release snapshot for manual backfill
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ steps.requested-target.outputs.target_sha }}
        run: |
          set -euo pipefail
          python3 .github/scripts/release_snapshot.py ensure \
            --target-sha "${TARGET_SHA}" \
            --github-repository "${GITHUB_REPOSITORY}" \
            --github-token "${GITHUB_TOKEN}" \
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}" \
            --registry "${REGISTRY}" \
            --snapshot-source manual-backfill \
            --output "$RUNNER_TEMP/release-snapshot.json"

      - name: Select release target
        id: release-target
        shell: bash
        env:
          REQUESTED_SHA: ${{ steps.requested-target.outputs.target_sha }}
          ALLOW_RELEASED_TARGET: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git fetch --no-tags origin "+${RELEASE_SNAPSHOT_NOTES_REF}:${RELEASE_SNAPSHOT_NOTES_REF}" || true
          extra_args=()
          if [ "${ALLOW_RELEASED_TARGET}" = "true" ]; then
            extra_args+=(--allow-released-target)
          fi
          python3 .github/scripts/release_snapshot.py select-target \
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}" \
            --requested-sha "${REQUESTED_SHA}" \
            "${extra_args[@]}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Load immutable release snapshot
        if: steps.release-target.outputs.target_sha != ''
        id: snapshot
        shell: bash
        env:
          TARGET_SHA: ${{ steps.release-target.outputs.target_sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "+${RELEASE_SNAPSHOT_NOTES_REF}:${RELEASE_SNAPSHOT_NOTES_REF}" || true
          python3 .github/scripts/release_snapshot.py export \
            --target-sha "${TARGET_SHA}" \
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}" \
            --main-ref "origin/main" \
            --resolve-publication-tags \
            --github-output "$GITHUB_OUTPUT"

      - name: Resolve publication mode
        id: publication-mode
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.snapshot.outputs.release_enabled }}" != "true" ] || [ -z "${{ steps.release-target.outputs.target_sha }}" ]; then
            echo "publish_container=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.release-target.outputs.assets_only }}" = "true" ]; then
            echo "publish_container=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish_container=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Inspect release ref mode
        if: steps.release-target.outputs.target_sha != ''
        id: release-ref-mode
        shell: bash
        env:
          TARGET_SHA: ${{ steps.release-target.outputs.target_sha }}
          RELEASE_ENABLED: ${{ steps.snapshot.outputs.release_enabled }}
          ASSETS_ONLY: ${{ steps.release-target.outputs.assets_only }}
        run: |
          set -euo pipefail
          target_touches_workflows=false
          requires_release_anchor=false

          if git diff-tree --no-commit-id --name-only -r -m --first-parent "${TARGET_SHA}" | grep -q '^.github/workflows/'; then
            target_touches_workflows=true
          fi

          if [ "${RELEASE_ENABLED}" = "true" ] && [ "${ASSETS_ONLY}" != "true" ] && [ "${target_touches_workflows}" = "true" ]; then
            requires_release_anchor=true
          fi

          echo "target_touches_workflows=${target_touches_workflows}" >> "$GITHUB_OUTPUT"
          echo "requires_release_anchor=${requires_release_anchor}" >> "$GITHUB_OUTPUT"

      - name: Summarize release selection
        shell: bash
        env:
          REQUESTED_SHA: ${{ steps.requested-target.outputs.target_sha }}
          SELECTED_TARGET_SHA: ${{ steps.release-target.outputs.selected_target_sha }}
          SELECTED_RELEASE_TAG: ${{ steps.snapshot.outputs.selected_release_tag }}
          RELEASE_ENABLED: ${{ steps.snapshot.outputs.release_enabled }}
          ASSETS_ONLY: ${{ steps.release-target.outputs.assets_only }}
          PUBLISH_CONTAINER: ${{ steps.publication-mode.outputs.publish_container }}
          BACKLOG_PENDING_COUNT: ${{ steps.release-target.outputs.backlog_pending_count }}
          BACKLOG_PENDING_TARGETS: ${{ steps.release-target.outputs.backlog_pending_targets }}
          TARGET_TOUCHES_WORKFLOWS: ${{ steps.release-ref-mode.outputs.target_touches_workflows }}
          REQUIRES_RELEASE_ANCHOR: ${{ steps.release-ref-mode.outputs.requires_release_anchor }}
        run: |
          set -euo pipefail
          {
            echo "## Release selection"
            echo
            echo "- requested_sha: \`${REQUESTED_SHA}\`"
            echo "- selected_target_sha: \`${SELECTED_TARGET_SHA}\`"
            echo "- selected_release_tag: \`${SELECTED_RELEASE_TAG:-n/a}\`"
            echo "- release_enabled: \`${RELEASE_ENABLED}\`"
            echo "- assets_only: \`${ASSETS_ONLY}\`"
            echo "- publish_container: \`${PUBLISH_CONTAINER}\`"
            echo "- target_touches_workflows: \`${TARGET_TOUCHES_WORKFLOWS:-false}\`"
            echo "- requires_release_anchor: \`${REQUIRES_RELEASE_ANCHOR:-false}\`"
            echo "- backlog_pending_count: \`${BACKLOG_PENDING_COUNT:-0}\`"
            if [ -n "${BACKLOG_PENDING_TARGETS}" ]; then
              echo "- backlog_pending_targets: \`${BACKLOG_PENDING_TARGETS}\`"
            else
              echo "- backlog_pending_targets: \`none\`"
            fi
            echo
            if [ "${ASSETS_ONLY}" = "true" ]; then
              echo "> Manual backfill is running in assets-only mode for the exact requested commit."
            fi
            if [ "${BACKLOG_PENDING_COUNT:-0}" != "0" ]; then
              echo "> Historical backlog remains pending and requires an explicit \`workflow_dispatch(commit_sha)\` backfill."
            fi
            if [ "${REQUIRES_RELEASE_ANCHOR:-false}" = "true" ]; then
              echo "> The selected target updates \`.github/workflows/**\`, so release publication will use a synthetic anchor commit on \`release-anchors/<tag>\` and still ship the latest version without extra repository secrets."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  docker-amd64:
    name: Build amd64 image digest
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [release-meta]
    if: ${{ needs.release-meta.outputs.release_enabled == 'true' && needs.release-meta.outputs.publish_container == 'true' }}
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-meta.outputs.target_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORM_AMD64 }}
          build-args: |
            APP_EFFECTIVE_VERSION=${{ needs.release-meta.outputs.app_effective_version }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=release-linux-amd64
          cache-to: type=gha,mode=max,scope=release-linux-amd64

      - name: Export amd64 digest artifact
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/digests"
          printf '%s\n' "${{ steps.build.outputs.digest }}" > "$RUNNER_TEMP/digests/amd64.digest"

      - name: Upload amd64 digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-digest-amd64
          path: ${{ runner.temp }}/digests/amd64.digest
          if-no-files-found: error

  docker-arm64:
    name: Build arm64 image digest
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    needs: [release-meta]
    if: ${{ needs.release-meta.outputs.release_enabled == 'true' && needs.release-meta.outputs.publish_container == 'true' }}
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-meta.outputs.target_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORM_ARM64 }}
          build-args: |
            APP_EFFECTIVE_VERSION=${{ needs.release-meta.outputs.app_effective_version }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=release-linux-arm64
          cache-to: type=gha,mode=max,scope=release-linux-arm64

      - name: Export arm64 digest artifact
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/digests"
          printf '%s\n' "${{ steps.build.outputs.digest }}" > "$RUNNER_TEMP/digests/arm64.digest"

      - name: Upload arm64 digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-digest-arm64
          path: ${{ runner.temp }}/digests/arm64.digest
          if-no-files-found: error

  binary-linux-amd64:
    name: Build linux amd64 release binary
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [release-meta]
    if: ${{ needs.release-meta.outputs.release_enabled == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout workflow files
        uses: actions/checkout@v4

      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-meta.outputs.target_sha }}
          path: target-src

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target-src -> target

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: target-src/web

      - name: Package linux amd64 release asset
        env:
          APP_EFFECTIVE_VERSION: ${{ needs.release-meta.outputs.app_effective_version }}
          RELEASE_ASSET_TAG: ${{ needs.release-meta.outputs.release_tag }}
        run: |
          set -euo pipefail
          out_dir="$RUNNER_TEMP/release-binary-linux-amd64"
          .github/scripts/package_release_asset.sh \
            --platform linux \
            --arch amd64 \
            --repo-root "$GITHUB_WORKSPACE/target-src" \
            --output-dir "$out_dir"

      - name: Upload linux amd64 release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-linux-amd64
          path: |
            ${{ runner.temp }}/release-binary-linux-amd64/*.tar.gz
            ${{ runner.temp }}/release-binary-linux-amd64/*.sha256
          if-no-files-found: error

  binary-linux-arm64:
    name: Build linux arm64 release binary
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    needs: [release-meta]
    if: ${{ needs.release-meta.outputs.release_enabled == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout workflow files
        uses: actions/checkout@v4

      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-meta.outputs.target_sha }}
          path: target-src

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target-src -> target

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: target-src/web

      - name: Package linux arm64 release asset
        env:
          APP_EFFECTIVE_VERSION: ${{ needs.release-meta.outputs.app_effective_version }}
          RELEASE_ASSET_TAG: ${{ needs.release-meta.outputs.release_tag }}
        run: |
          set -euo pipefail
          out_dir="$RUNNER_TEMP/release-binary-linux-arm64"
          .github/scripts/package_release_asset.sh \
            --platform linux \
            --arch arm64 \
            --repo-root "$GITHUB_WORKSPACE/target-src" \
            --output-dir "$out_dir"

      - name: Upload linux arm64 release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-linux-arm64
          path: |
            ${{ runner.temp }}/release-binary-linux-arm64/*.tar.gz
            ${{ runner.temp }}/release-binary-linux-arm64/*.sha256
          if-no-files-found: error

  binary-darwin-amd64:
    name: Build darwin amd64 release binary
    runs-on: macos-15-intel
    timeout-minutes: 60
    needs: [release-meta]
    if: ${{ needs.release-meta.outputs.release_enabled == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout workflow files
        uses: actions/checkout@v4

      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-meta.outputs.target_sha }}
          path: target-src

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target-src -> target

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: target-src/web

      - name: Package darwin amd64 release asset
        env:
          APP_EFFECTIVE_VERSION: ${{ needs.release-meta.outputs.app_effective_version }}
          RELEASE_ASSET_TAG: ${{ needs.release-meta.outputs.release_tag }}
        run: |
          set -euo pipefail
          out_dir="$RUNNER_TEMP/release-binary-darwin-amd64"
          .github/scripts/package_release_asset.sh \
            --platform darwin \
            --arch amd64 \
            --repo-root "$GITHUB_WORKSPACE/target-src" \
            --output-dir "$out_dir"

      - name: Upload darwin amd64 release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-darwin-amd64
          path: |
            ${{ runner.temp }}/release-binary-darwin-amd64/*.tar.gz
            ${{ runner.temp }}/release-binary-darwin-amd64/*.sha256
          if-no-files-found: error

  binary-darwin-arm64:
    name: Build darwin arm64 release binary
    runs-on: macos-14
    timeout-minutes: 60
    needs: [release-meta]
    if: ${{ needs.release-meta.outputs.release_enabled == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout workflow files
        uses: actions/checkout@v4

      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-meta.outputs.target_sha }}
          path: target-src

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target-src -> target

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: target-src/web

      - name: Package darwin arm64 release asset
        env:
          APP_EFFECTIVE_VERSION: ${{ needs.release-meta.outputs.app_effective_version }}
          RELEASE_ASSET_TAG: ${{ needs.release-meta.outputs.release_tag }}
        run: |
          set -euo pipefail
          out_dir="$RUNNER_TEMP/release-binary-darwin-arm64"
          .github/scripts/package_release_asset.sh \
            --platform darwin \
            --arch arm64 \
            --repo-root "$GITHUB_WORKSPACE/target-src" \
            --output-dir "$out_dir"

      - name: Upload darwin arm64 release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-darwin-arm64
          path: |
            ${{ runner.temp }}/release-binary-darwin-arm64/*.tar.gz
            ${{ runner.temp }}/release-binary-darwin-arm64/*.sha256
          if-no-files-found: error

  merge-manifest:
    name: Merge manifest and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [release-meta, docker-amd64, docker-arm64, binary-linux-amd64, binary-linux-arm64, binary-darwin-amd64, binary-darwin-arm64]
    if: >-
      ${{
        always() &&
        needs.release-meta.outputs.release_enabled == 'true' &&
        needs.binary-linux-amd64.result == 'success' &&
        needs.binary-linux-arm64.result == 'success' &&
        needs.binary-darwin-amd64.result == 'success' &&
        needs.binary-darwin-arm64.result == 'success' &&
        (
          needs.release-meta.outputs.publish_container != 'true' ||
          (needs.docker-amd64.result == 'success' && needs.docker-arm64.result == 'success')
        )
      }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-meta.outputs.target_sha }}
          fetch-depth: 0

      - name: Configure git identity for release bot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve release commit
        id: release-ref
        shell: bash
        env:
          TARGET_SHA: ${{ needs.release-meta.outputs.target_sha }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          REQUIRES_RELEASE_ANCHOR: ${{ needs.release-meta.outputs.requires_release_anchor }}
        run: |
          set -euo pipefail
          release_ref_sha="${TARGET_SHA}"
          release_ref_kind="target"
          release_anchor_branch=""

          if [ "${REQUIRES_RELEASE_ANCHOR}" = "true" ]; then
            release_anchor_branch="release-anchors/${RELEASE_TAG}"
            remote_ref="refs/remotes/origin/${release_anchor_branch}"
            expected_subject="chore(release): anchor ${RELEASE_TAG}"
            expected_target_trailer="Target-SHA: ${TARGET_SHA}"
            workflow_source_ref="refs/remotes/origin/main"

            git fetch --no-tags origin \
              "+refs/heads/main:refs/remotes/origin/main" \
              "+refs/heads/release-anchors/*:refs/remotes/origin/release-anchors/*" || true

            if ! git show-ref --verify --quiet "${workflow_source_ref}"; then
              echo "Unable to resolve ${workflow_source_ref} for release anchor synthesis" >&2
              exit 1
            fi

            if git show-ref --verify --quiet "${remote_ref}"; then
              candidate_sha="$(git rev-parse "${remote_ref}")"
              subject="$(git log -1 --format=%s "${candidate_sha}")"
              body="$(git log -1 --format=%B "${candidate_sha}")"

              if ! printf '%s\n' "${body}" | grep -Fxq "${expected_target_trailer}"; then
                echo "Existing ${release_anchor_branch} does not declare target ${TARGET_SHA}" >&2
                exit 1
              fi

              if [ "${subject}" != "${expected_subject}" ]; then
                echo "Existing ${release_anchor_branch} has unexpected subject: ${subject}" >&2
                exit 1
              fi

              if ! git diff --quiet "${candidate_sha}" "${workflow_source_ref}" -- .github/workflows; then
                echo "Existing ${release_anchor_branch} does not preserve current workflow files" >&2
                exit 1
              fi

              release_ref_sha="${candidate_sha}"
              release_ref_kind="anchor"
            else
              git checkout --detach "${workflow_source_ref}"
              git restore --source "${TARGET_SHA}" --staged --worktree -- .
              git restore --source "${workflow_source_ref}" --staged --worktree -- .github/workflows
              git add -A

              if git diff --cached --quiet; then
                release_ref_sha="${TARGET_SHA}"
                release_ref_kind="target"
                release_anchor_branch=""
              else
                git commit \
                  -m "${expected_subject}" \
                  -m "Release anchor for ${TARGET_SHA} so the workflow can publish the latest version without requiring workflows permission on the original merge commit." \
                  -m "${expected_target_trailer}" \
                  -m "Workflow-Tree-Source: origin/main"
                release_ref_sha="$(git rev-parse HEAD)"
                git push origin "HEAD:refs/heads/${release_anchor_branch}"
                release_ref_kind="anchor"
              fi
            fi
          fi

          echo "release_ref_sha=${release_ref_sha}" >> "$GITHUB_OUTPUT"
          echo "release_ref_kind=${release_ref_kind}" >> "$GITHUB_OUTPUT"
          echo "release_anchor_branch=${release_anchor_branch}" >> "$GITHUB_OUTPUT"

      - name: Download amd64 digest artifact
        if: needs.release-meta.outputs.publish_container == 'true'
        uses: actions/download-artifact@v4
        with:
          name: release-digest-amd64
          path: ${{ runner.temp }}/digests/amd64

      - name: Download arm64 digest artifact
        if: needs.release-meta.outputs.publish_container == 'true'
        uses: actions/download-artifact@v4
        with:
          name: release-digest-arm64
          path: ${{ runner.temp }}/digests/arm64

      - name: Download linux amd64 release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-binary-linux-amd64
          path: ${{ runner.temp }}/release-binaries/linux-amd64

      - name: Download linux arm64 release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-binary-linux-arm64
          path: ${{ runner.temp }}/release-binaries/linux-arm64

      - name: Download darwin amd64 release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-binary-darwin-amd64
          path: ${{ runner.temp }}/release-binaries/darwin-amd64

      - name: Download darwin arm64 release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-binary-darwin-arm64
          path: ${{ runner.temp }}/release-binaries/darwin-arm64

      - name: Set up Docker Buildx
        if: needs.release-meta.outputs.publish_container == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: needs.release-meta.outputs.publish_container == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release manifest tags
        if: needs.release-meta.outputs.publish_container == 'true'
        shell: bash
        env:
          IMAGE_NAME_LOWER: ${{ needs.release-meta.outputs.image_name_lower }}
          TAGS_CSV: ${{ needs.release-meta.outputs.tags_csv }}
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}"
          amd64_digest="$(tr -d '\n' < "$RUNNER_TEMP/digests/amd64/amd64.digest")"
          arm64_digest="$(tr -d '\n' < "$RUNNER_TEMP/digests/arm64/arm64.digest")"
          amd64_ref="${image}@${amd64_digest}"
          arm64_ref="${image}@${arm64_digest}"

          IFS=',' read -r -a tags <<< "${TAGS_CSV}"
          for tag in "${tags[@]}"; do
            [[ -z "${tag}" ]] && continue
            echo "[manifest] ${tag} <= ${amd64_ref}, ${arm64_ref}"
            for attempt in 1 2 3 4 5; do
              if docker buildx imagetools create --tag "${tag}" "${amd64_ref}" "${arm64_ref}" 2>"/tmp/imagetools-create-${attempt}.err"; then
                break
              fi
              if [[ "${attempt}" == "5" ]]; then
                echo "[manifest] failed after ${attempt} attempts for ${tag}" >&2
                if [[ -s "/tmp/imagetools-create-${attempt}.err" ]]; then
                  cat "/tmp/imagetools-create-${attempt}.err" >&2
                fi
                exit 1
              fi
              sleep_secs=$((attempt * 3))
              echo "[manifest] retry in ${sleep_secs}s (${attempt}/5): ${tag}" >&2
              sleep "${sleep_secs}"
            done
          done

      - name: Verify pushed manifest platforms
        if: needs.release-meta.outputs.publish_container == 'true'
        shell: bash
        env:
          REQUIRED_PLATFORMS: ${{ env.PLATFORMS }}
          TAGS_CSV: ${{ needs.release-meta.outputs.tags_csv }}
        run: |
          set -euo pipefail
          IFS=',' read -r -a tags <<< "${TAGS_CSV}"
          for tag in "${tags[@]}"; do
            [[ -z "${tag}" ]] && continue
            echo "[verify] ${tag}"
            for attempt in 1 2 3 4 5; do
              if raw_json="$(docker buildx imagetools inspect "${tag}" --raw 2>"/tmp/imagetools-${attempt}.err")"; then
                if RAW_JSON="${raw_json}" python3 .github/scripts/verify_manifest_platforms.py "${tag}"; then
                  break
                fi
              fi

              if [[ "${attempt}" == "5" ]]; then
                echo "[verify] failed after ${attempt} attempts for ${tag}" >&2
                if [[ -s "/tmp/imagetools-${attempt}.err" ]]; then
                  cat "/tmp/imagetools-${attempt}.err" >&2
                fi
                exit 1
              fi

              sleep_secs=$((attempt * 3))
              echo "[verify] retry in ${sleep_secs}s (${attempt}/5): ${tag}" >&2
              sleep "${sleep_secs}"
            done
          done

      - name: Create and push git tag
        if: needs.release-meta.outputs.publish_container == 'true'
        shell: bash
        env:
          APP_EFFECTIVE_VERSION: ${{ needs.release-meta.outputs.app_effective_version }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          RELEASE_REF_SHA: ${{ steps.release-ref.outputs.release_ref_sha }}
        run: |
          set -euo pipefail
          git fetch --tags origin

          tag="${RELEASE_TAG}"
          sha="${RELEASE_REF_SHA}"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            existing="$(git rev-list -n 1 "${tag}")"
            if [[ "${existing}" != "${sha}" ]]; then
              echo "Tag ${tag} already exists but points to ${existing} (expected ${sha})" >&2
              exit 1
            fi
            echo "Tag ${tag} already exists and points to ${sha}."
          else
            git tag -a "${tag}" "${sha}" -m "release ${APP_EFFECTIVE_VERSION}"
          fi

          git push origin "${tag}"

      - name: Ensure GitHub Release
        id: ensure-release
        uses: actions/github-script@v7
        env:
          RELEASE_COMMITISH: ${{ steps.release-ref.outputs.release_ref_sha }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          RELEASE_PRERELEASE: ${{ needs.release-meta.outputs.release_prerelease }}
          RELEASE_TAGS_CSV: ${{ needs.release-meta.outputs.tags_csv }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo
            const tag = process.env.RELEASE_TAG
            const targetSha = process.env.RELEASE_COMMITISH
            const prerelease = process.env.RELEASE_PRERELEASE === 'true'
            const publicationTags = (process.env.RELEASE_TAGS_CSV || '')
              .split(',')
              .map(value => value.trim())
              .filter(Boolean)
            const makeLatest = publicationTags.some(value => value.endsWith(':latest')) ? 'true' : 'false'

            if (!tag) {
              core.setFailed('Missing RELEASE_TAG')
              return
            }

            let release
            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag })
              const updated = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                tag_name: tag,
                name: tag,
                target_commitish: targetSha,
                prerelease,
                make_latest: makeLatest,
              })
              release = updated.data
              core.notice(`GitHub Release already exists for tag ${tag}; normalized latest=${makeLatest} on ${release.id}.`)
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }

              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                target_commitish: targetSha,
                prerelease,
                make_latest: makeLatest,
                generate_release_notes: true,
              })
              release = created.data
              core.notice(`Created GitHub Release for tag ${tag} with latest=${makeLatest}.`)
            }

            core.setOutput('release_id', String(release.id))

      - name: Assemble binary release assets
        id: assemble-assets
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
        run: |
          set -euo pipefail
          assets_root="$RUNNER_TEMP/release-binaries"
          asset_dir="$RUNNER_TEMP/release-assets"
          manifest_path="$asset_dir/proxy-broker-${RELEASE_TAG}-sha256.txt"

          mkdir -p "$asset_dir"

          mapfile -t tarballs < <(find "$assets_root" -type f -name '*.tar.gz' | sort)
          mapfile -t checksums < <(find "$assets_root" -type f -name '*.sha256' | sort)

          if [[ "${#tarballs[@]}" -ne 4 ]]; then
            echo "expected 4 release tarballs, found ${#tarballs[@]}" >&2
            exit 1
          fi

          if [[ "${#checksums[@]}" -ne 4 ]]; then
            echo "expected 4 checksum fragments, found ${#checksums[@]}" >&2
            exit 1
          fi

          for tarball in "${tarballs[@]}"; do
            cp "${tarball}" "$asset_dir/"
          done

          cat "${checksums[@]}" | sort > "$manifest_path"

          echo "asset_dir=$asset_dir" >> "$GITHUB_OUTPUT"
          echo "manifest_path=$manifest_path" >> "$GITHUB_OUTPUT"

      - name: Upload binary release assets
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.ensure-release.outputs.release_id }}
          ASSET_DIR: ${{ steps.assemble-assets.outputs.asset_dir }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const path = require('path')
            const { owner, repo } = context.repo
            const releaseId = Number(process.env.RELEASE_ID)
            const assetDir = process.env.ASSET_DIR

            if (!releaseId) {
              core.setFailed('Missing RELEASE_ID')
              return
            }

            if (!assetDir) {
              core.setFailed('Missing ASSET_DIR')
              return
            }

            const assetNames = fs
              .readdirSync(assetDir)
              .filter(name => name.endsWith('.tar.gz') || name.endsWith('.txt'))
              .sort()

            if (assetNames.length !== 5) {
              core.setFailed(`Expected 5 release assets, found ${assetNames.length}`)
              return
            }

            const existingAssets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: releaseId,
              per_page: 100,
            })

            for (const assetName of assetNames) {
              const existing = existingAssets.find(asset => asset.name === assetName)
              if (existing) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: existing.id,
                })
                core.notice(`Deleted existing release asset ${assetName}`)
              }

              const assetPath = path.join(assetDir, assetName)
              const data = fs.readFileSync(assetPath)
              const contentType = assetName.endsWith('.txt')
                ? 'text/plain; charset=utf-8'
                : 'application/gzip'

              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: releaseId,
                name: assetName,
                data,
                headers: {
                  'content-type': contentType,
                  'content-length': data.length,
                },
              })

              core.notice(`Uploaded release asset ${assetName}`)
            }

      - name: Mark snapshot as released
        shell: bash
        env:
          PUBLISHED_TAGS: ${{ needs.release-meta.outputs.tags_csv }}
          TARGET_SHA: ${{ needs.release-meta.outputs.target_sha }}
        run: |
          set -euo pipefail
          python3 .github/scripts/release_snapshot.py mark-released \
            --target-sha "${TARGET_SHA}" \
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}" \
            --published-tags "${PUBLISHED_TAGS}"
