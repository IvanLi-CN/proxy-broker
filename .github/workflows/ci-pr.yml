name: CI PR

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, edited]

permissions:
  contents: read

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Web and Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium
        working-directory: web

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Biome check
        run: bun run check
        working-directory: web

      - name: Vitest
        run: bun run test
        working-directory: web

      - name: Verify stories
        run: bun run verify:stories
        working-directory: web

      - name: Build Storybook
        run: bun run build-storybook
        working-directory: web

      - name: Test Storybook
        run: bun run test-storybook
        working-directory: web

      - name: Build web app
        run: bun run build
        working-directory: web

      - name: Playwright smoke
        run: bun run test:e2e
        working-directory: web

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --all-features

      - name: Release packaging smoke
        env:
          APP_EFFECTIVE_VERSION: v0.0.0-ci
        run: |
          set -euo pipefail
          out_dir="$RUNNER_TEMP/release-smoke"
          .github/scripts/package_release_asset.sh \
            --platform linux \
            --arch amd64 \
            --output-dir "$out_dir"
          test -f "$out_dir/proxy-broker-v0.0.0-ci-linux-amd64.tar.gz"
          test -f "$out_dir/proxy-broker-v0.0.0-ci-linux-amd64.sha256"

      - name: Check release workflow scripts
        run: |
          python3 -m py_compile \
            .github/scripts/metadata_gate.py \
            .github/scripts/release_snapshot.py \
            .github/scripts/verify_manifest_platforms.py
          bash -n .github/scripts/package_release_asset.sh

      - name: Test release snapshot logic
        run: bash .github/scripts/test-release-snapshot.sh

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: web/storybook-static
          if-no-files-found: error
