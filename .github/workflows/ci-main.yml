name: CI Main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  RELEASE_SNAPSHOT_NOTES_REF: refs/notes/release-snapshots

concurrency:
  group: ci-main-main
  cancel-in-progress: false

jobs:
  checks:
    name: Web and Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Install Playwright headless shell
        run: bunx playwright install --with-deps --only-shell
        working-directory: web

      - name: Biome check
        run: bun run check
        working-directory: web

      - name: Vitest
        run: bun run test
        working-directory: web

      - name: Verify stories
        run: bun run verify:stories
        working-directory: web

      - name: Build Storybook
        run: bun run build-storybook
        working-directory: web

      - name: Test Storybook
        run: bun run test-storybook
        working-directory: web

      - name: Build web app
        run: bun run build
        working-directory: web

      - name: Playwright smoke
        run: bun run test:e2e
        working-directory: web

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --all-features

      - name: Release packaging smoke
        env:
          APP_EFFECTIVE_VERSION: v0.0.0-ci
        run: |
          set -euo pipefail
          out_dir="$RUNNER_TEMP/release-smoke"
          .github/scripts/package_release_asset.sh \
            --platform linux \
            --arch amd64 \
            --output-dir "$out_dir"
          test -f "$out_dir/proxy-broker-v0.0.0-ci-linux-amd64.tar.gz"
          test -f "$out_dir/proxy-broker-v0.0.0-ci-linux-amd64.sha256"

  release-snapshot:
    name: Release Snapshot
    runs-on: ubuntu-latest
    needs: [checks]
    permissions:
      contents: write
      issues: read
      pull-requests: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity for release notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check release workflow scripts
        run: |
          python3 -m py_compile \
            .github/scripts/metadata_gate.py \
            .github/scripts/release_snapshot.py \
            .github/scripts/verify_manifest_platforms.py
          bash -n .github/scripts/package_release_asset.sh

      - name: Test release snapshot logic
        run: bash .github/scripts/test-release-snapshot.sh

      - name: Ensure immutable release snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 .github/scripts/release_snapshot.py ensure \
            --target-sha "${GITHUB_SHA}" \
            --github-repository "${GITHUB_REPOSITORY}" \
            --github-token "${GITHUB_TOKEN}" \
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}" \
            --registry "${REGISTRY}" \
            --output "$RUNNER_TEMP/release-snapshot.json"

      - name: Show release snapshot summary
        env:
          SNAPSHOT_PATH: ${{ runner.temp }}/release-snapshot.json
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(os.environ["SNAPSHOT_PATH"]).read_text())
          print("release_enabled=", payload["release_enabled"])
          print("target_sha=", payload["target_sha"])
          print("release_tag=", payload.get("release_tag", ""))
          print("pr_number=", payload.get("pr_number", ""))
          print("status=", payload.get("status", ""))
          PY
